name: CD - Build & Push Images

on:
  push:
    branches: [ master ]
    paths:
      - "api-gateway/**"
      - "user-service/**"
      - "ticket-service/**"
      - "payment-service/**"
      - "inventory-service/**"
      - "notification-service/**"
      - "saga-orchestrator-service/**"
      - "docker-compose.yml"
      - ".github/workflows/cd.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ticket-system

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JARs (skip tests for CD)
        run: mvn -B -DskipTests package

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker-compose.yml
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api-gateway:${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-user-service:${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-ticket-service:${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-payment-service:${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-inventory-service:${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-notification-service:${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-saga-orchestrator-service:${{ steps.vars.outputs.short_sha }}

  # Optional: stub for k8s deploy, to be wired when a cluster is available
  deploy:
    if: false  # enable when you are ready to deploy to a cluster
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${KUBECONFIG_CONTENT}" > $HOME/.kube/config
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_CONTENT }}

      - name: Apply k8s manifests
        run: kubectl apply -f k8s/

